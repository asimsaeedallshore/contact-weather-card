name: HubSpot Project Deploy

on:
  workflow_dispatch:
    inputs:
      source:
        description: Source trigger
        required: false
        default: electron-app
      project:
        description: HubSpot project name
        required: false
        default: contact-weather-card
      target:
        description: Target environment
        required: false
        default: Wind-Dev
      selectedCount:
        description: Number of selected components/files
        required: false
        default: "0"
      project_directory:
        description: HubSpot project directory
        required: false
        default: "."
      hubspot_account_name:
        description: HubSpot account name
        required: false
        default: "Bandwidth-Dev"

permissions:
  contents: read

env:
  DEFAULT_ACCOUNT_ID: ${{ secrets.HUBSPOT_ACCOUNT_ID }}
  DEFAULT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
  DEFAULT_CLI_VERSION: "8.0.0"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate HubSpot project structure
        run: |
          test -f hsproject.json
          test -d src
          echo "HubSpot project structure found."

      - name: Upload to HubSpot
        uses: HubSpot/hubspot-project-actions@v1.1.0
